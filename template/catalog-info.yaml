apiVersion: backstage.io/v1alpha1
kind: Component

metadata:
  name: ${{values.app_name}}
  description: Service ${{values.app_name}}

  annotations:
    github.com/project-slug: ${{ parameters.repoUrl | parseRepoUrl | pick('owner') }}/${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}
    backstage.io/techdocs-ref: dir:.
    jenkins.io/job-full-name: ${{values.app_name}}
    argocd/app-name: ${{ values.app_name | lower }}
    backstage.io/kubernetes-id: ${{values.app_name}}
    backstage.io/kubernetes-namespace: default

spec:
  type: service
  owner: development
  lifecycle: experimental