apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: retrofit-jenkins-argocd
  title: Inject CI/CD into Existing Repo
  description: Inject CI/CD directly into main branch

spec:
  owner: development
  type: service

  parameters:
    - title: Select Existing Repository
      required:
        - repo
        - component_id
        - environment

      properties:

        repo:
          title: Select Repository
          type: string
          # ui:field: RepoDropdown

        component_id:
          title: Component Name
          type: string

        environment:
          title: Environment
          type: string
          enum:
            - dev
            - prod

  steps:

    - id: fetch-base
      name: Fetch Template Files
      action: fetch:template
      input:
        url: ./template
        values:
          app_name: ${{ parameters.component_id }}
          app_env: ${{ parameters.environment }}

    # - id: register
    #   name: Register in Catalog
    #   action: catalog:register
    #   input:
    #     repoContentsUrl: https://github.com/Backstage-GoldenImage/${{ parameters.repo }}/blob/main
    #     catalogInfoPath: /catalog-info.yaml
    #     optional: true

    - id: push-to-main
      name: Inject CI/CD Directly
      action: github:push
      input:
        repoUrl: github.com?owner=Backstage-GoldenImage&repo=${{ parameters.repo }}
        branch: main
        commitMessage: "Inject CI/CD template [skip ci]"
        sourcePath: ./

  output:
    links:
      - title: View Repository
        url: https://github.com/Backstage-GoldenImage/${{ parameters.repo }}
